name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., v1.2.0)'
        required: true
        type: string
      release_run_id:
        description: 'Run ID with pre-generated release notes'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  actions: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: publish
    uses: hyperb1iss/shared-workflows/.github/workflows/github-release.yml@v1
    with:
      release-notes-run-id: ${{ inputs.release_run_id || '' }}
    secrets: inherit
