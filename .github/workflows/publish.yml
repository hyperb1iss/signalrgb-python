name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., v1.2.0)'
        required: true
        type: string
      release_run_id:
        description: 'Run ID with pre-generated release notes'
        required: false
        type: string

jobs:
  publish:
    uses: hyperb1iss/shared-workflows/.github/workflows/python-publish.yml@v1
    with:
      checkout-ref: ${{ inputs.tag || github.ref }}
    secrets: inherit

  release:
    needs: publish
    uses: hyperb1iss/shared-workflows/.github/workflows/github-release.yml@v1
    with:
      release-notes-run-id: ${{ inputs.release_run_id || '' }}
    secrets: inherit
