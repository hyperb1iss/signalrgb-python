name: Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build docs from (empty = default branch)'
        required: false
        type: string

jobs:
  deploy:
    uses: hyperb1iss/shared-workflows/.github/workflows/docs-deploy.yml@v1
    with:
      engine: mkdocs
      docs-dir: '.'
      python-version: '3.13'
    secrets: inherit
